<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Louis – TRMNL Display</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
/* E-ink: black/white only, high contrast, no animations */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: #ffffff;
  color: #000000;
  width: 800px;
  height: 480px;
  overflow: hidden;
  padding: 20px;
}

/* ── LAYOUT: 3 columns ── */
.grid {
  display: grid;
  grid-template-columns: 220px 1fr 200px;
  grid-template-rows: auto 1fr;
  gap: 16px;
  height: 100%;
}

/* ── HEADER bar ── */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 3px solid #000;
  padding-bottom: 10px;
}
.header-title { font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; }
.header-sub { font-size: 0.75rem; color: #555; font-weight: 700; }
.header-time { font-size: 0.72rem; color: #777; text-align: right; font-weight: 700; }

/* ── LEFT: Balance ── */
.col-balance {
  border-right: 2px solid #ddd;
  padding-right: 16px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}
.balance-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #555; }
.balance-number { font-size: 5rem; font-weight: 900; line-height: 1; margin: 6px 0 4px; }
.balance-unit { font-size: 0.85rem; font-weight: 800; color: #333; margin-bottom: 14px; }

/* Brick progress row */
.bricks { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; margin-bottom: 10px; }
.brick { width: 18px; height: 12px; background: #000; border-radius: 2px; }
.brick.empty { background: #eee; border: 1px solid #ccc; }

.next-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; color: #777; margin-bottom: 3px; }
.next-reward { font-size: 0.8rem; font-weight: 800; }
.next-gap { font-size: 0.72rem; color: #555; }

/* ── MIDDLE: Behaviours ── */
.col-earn { padding: 0 8px; }
.section-title { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; color: #555; margin-bottom: 6px; border-bottom: 1.5px solid #eee; padding-bottom: 3px; }
.behaviour { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.b-emoji { font-size: 0.95rem; width: 22px; text-align: center; }
.b-text { font-size: 0.75rem; font-weight: 700; flex: 1; }
.b-worth { font-size: 0.7rem; font-weight: 800; color: #333; white-space: nowrap; }
.b-worth::before { content: '+'; }

/* ── RIGHT: Rewards ── */
.col-rewards { border-left: 2px solid #ddd; padding-left: 16px; }
.reward { margin-bottom: 10px; }
.reward-top { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.r-emoji { font-size: 0.95rem; }
.r-name { font-size: 0.75rem; font-weight: 800; flex: 1; }
.r-cost { font-size: 0.7rem; font-weight: 800; color: #333; white-space: nowrap; }
.r-bar-bg { background: #eee; border-radius: 99px; height: 6px; overflow: hidden; border: 1px solid #ccc; }
.r-bar-fill { height: 100%; background: #000; border-radius: 99px; }
.r-pct { font-size: 0.62rem; color: #888; text-align: right; font-weight: 700; margin-top: 1px; }
.r-ready { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="grid">

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="header-title">⭐ Louis's Star Bank</div>
      <div class="header-sub">Save up or cash in — it's your choice!</div>
    </div>
    <div class="header-time" id="headerTime"></div>
  </div>

  <!-- LEFT: Balance -->
  <div class="col-balance">
    <div class="balance-label">Current Balance</div>
    <div class="balance-number" id="balanceNum">0</div>
    <div class="balance-unit">Stars ⭐</div>
    <div class="bricks" id="brickDisplay"></div>
    <div class="next-label">Next reward</div>
    <div class="next-reward" id="nextReward">—</div>
    <div class="next-gap" id="nextGap"></div>
  </div>

  <!-- MIDDLE: Behaviours -->
  <div class="col-earn">
    <div class="section-title">Ways to earn ⭐</div>
    <div id="behaviourList"></div>
    <div class="section-title" style="margin-top:10px;">Louis can claim</div>
    <div id="selfList"></div>
  </div>

  <!-- RIGHT: Rewards -->
  <div class="col-rewards">
    <div class="section-title">Rewards 🎁</div>
    <div id="rewardList"></div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════
//  SUPABASE CONFIG — same values as PWA
// ═══════════════════════════════════════════════════
const SUPABASE_URL = 'https://oxmaqeuhdggpmvxatxzk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im94bWFxZXVoZGdncG12eGF0eHprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDcyMTAsImV4cCI6MjA4ODEyMzIxMH0.uASYH1AyKKRVDuf2on2sMQ8A2S2lnM9ToDcuJBBtPvc';
// ═══════════════════════════════════════════════════

const USE_SUPABASE = SUPABASE_URL !== 'https://oxmaqeuhdggpmvxatxzk.supabase.co';

const parentBehaviours = [
  { emoji:'😌', text:'Handled a "no" calmly', worth:2 },
  { emoji:'💬', text:'Kind words when frustrated', worth:2 },
  { emoji:'👂', text:'Responded first time', worth:2 },
  { emoji:'🧘', text:'Calmed down after upset', worth:2 },
  { emoji:'💛', text:'Was kind unprompted', worth:2 },
];
const selfBehaviours = [
  { emoji:'👕', text:'Got dressed alone', worth:1 },
  { emoji:'🦷', text:'Cleaned teeth alone', worth:1 },
  { emoji:'🧹', text:'Tidied room', worth:1 },
  { emoji:'🛏️', text:'Into bed on time', worth:1 },
];
const rewards = [
  { emoji:'🕹️', name:'Extra screen time', cost:4 },
  { emoji:'🍕', name:'Choice of dinner', cost:5 },
  { emoji:'🎬', name:'Movie night', cost:8 },
  { emoji:'💛', name:'Day out with Mummy', cost:20 },
  { emoji:'🧱', name:'Small Lego set', cost:30 },
  { emoji:'🏆', name:'Big Lego set', cost:60 },
];

let balance = 0;

async function loadBalance() {
  if (!USE_SUPABASE) return;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/louis_state?select=balance&limit=1`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    balance = data?.[0]?.balance ?? 0;
  } catch(e) { balance = 0; }
}

function render() {
  // balance
  document.getElementById('balanceNum').textContent = balance;

  // bricks (up to 20 slots)
  const bEl = document.getElementById('brickDisplay');
  const slots = 20;
  bEl.innerHTML = '';
  for (let i = 0; i < slots; i++) {
    const d = document.createElement('div');
    d.className = 'brick' + (i < balance ? '' : ' empty');
    bEl.appendChild(d);
  }

  // next reward
  const next = rewards.find(r => r.cost > balance);
  if (next) {
    document.getElementById('nextReward').textContent = next.emoji + ' ' + next.name;
    const gap = next.cost - balance;
    document.getElementById('nextGap').textContent = gap + ' more ⭐ to go!';
  } else {
    document.getElementById('nextReward').textContent = '🏆 You can claim anything!';
    document.getElementById('nextGap').textContent = '';
  }

  // behaviours
  document.getElementById('behaviourList').innerHTML = parentBehaviours.map(b => `
    <div class="behaviour">
      <div class="b-emoji">${b.emoji}</div>
      <div class="b-text">${b.text}</div>
      <div class="b-worth">${b.worth} ⭐</div>
    </div>`).join('');
  document.getElementById('selfList').innerHTML = selfBehaviours.map(b => `
    <div class="behaviour">
      <div class="b-emoji">${b.emoji}</div>
      <div class="b-text">${b.text}</div>
      <div class="b-worth">${b.worth} ⭐</div>
    </div>`).join('');

  // rewards
  document.getElementById('rewardList').innerHTML = rewards.map(r => {
    const pct = Math.min(100, Math.round((balance / r.cost) * 100));
    const ready = balance >= r.cost;
    return `<div class="reward">
      <div class="reward-top">
        <div class="r-emoji">${r.emoji}</div>
        <div class="r-name">${r.name}</div>
        <div class="r-cost">${r.cost}⭐</div>
      </div>
      ${ready
        ? `<div class="r-ready">✓ Ready to claim!</div>`
        : `<div class="r-bar-bg"><div class="r-bar-fill" style="width:${pct}%"></div></div>
           <div class="r-pct">${pct}%</div>`
      }
    </div>`;
  }).join('');

  // time
  document.getElementById('headerTime').textContent =
    'Last updated: ' + new Date().toLocaleString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}

async function init() {
  await loadBalance();
  render();
}

init();
</script>
</body>
</html>
