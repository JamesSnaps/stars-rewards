<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Louis – TRMNL Display</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: #ffffff;
  color: #000000;
  width: 800px;
  height: 480px;
  overflow: hidden;
  padding: 20px;
}
.grid {
  display: grid;
  grid-template-columns: 220px 1fr 200px;
  grid-template-rows: auto 1fr;
  gap: 16px;
  height: 100%;
}
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 3px solid #000;
  padding-bottom: 10px;
}
.header-title { font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; }
.header-sub { font-size: 0.75rem; color: #555; font-weight: 700; }
.header-time { font-size: 0.72rem; color: #777; text-align: right; font-weight: 700; }

.col-balance {
  border-right: 2px solid #ddd;
  padding-right: 16px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}
.balance-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #555; }
.balance-number { font-size: 5rem; font-weight: 900; line-height: 1; margin: 6px 0 4px; }
.balance-unit { font-size: 0.85rem; font-weight: 800; color: #333; margin-bottom: 14px; }
.bricks { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; margin-bottom: 10px; }
.brick { width: 18px; height: 12px; background: #000; border-radius: 2px; }
.brick.empty { background: #eee; border: 1px solid #ccc; }
.next-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; color: #777; margin-bottom: 3px; }
.next-reward { font-size: 0.8rem; font-weight: 800; }
.next-gap { font-size: 0.72rem; color: #555; }

.col-earn { padding: 0 8px; overflow: hidden; }
.section-title { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px;
  color: #555; margin-bottom: 6px; border-bottom: 1.5px solid #eee; padding-bottom: 3px; }
.behaviour { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.b-emoji { font-size: 0.95rem; width: 22px; text-align: center; }
.b-text { font-size: 0.75rem; font-weight: 700; flex: 1; }
.b-worth { font-size: 0.7rem; font-weight: 800; color: #333; white-space: nowrap; }
.b-worth::before { content: '+'; }

.col-rewards { border-left: 2px solid #ddd; padding-left: 16px; overflow: hidden; }
.reward { margin-bottom: 10px; }
.reward-top { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.r-emoji { font-size: 0.95rem; }
.r-img { width: 20px; height: 20px; border-radius: 4px; object-fit: cover; }
.r-name { font-size: 0.75rem; font-weight: 800; flex: 1; }
.r-cost { font-size: 0.7rem; font-weight: 800; color: #333; white-space: nowrap; }
.r-bar-bg { background: #eee; border-radius: 99px; height: 6px; overflow: hidden; border: 1px solid #ccc; }
.r-bar-fill { height: 100%; background: #000; border-radius: 99px; }
.r-pct { font-size: 0.62rem; color: #888; text-align: right; font-weight: 700; margin-top: 1px; }
.r-ready { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
.loading { font-size: 0.75rem; color: #aaa; font-weight: 700; }
</style>
</head>
<body>

<div class="grid">
  <div class="header">
    <div>
      <div class="header-title">⭐ Louis's Star Bank</div>
      <div class="header-sub">Save up or cash in — it's your choice!</div>
    </div>
    <div class="header-time" id="headerTime"></div>
  </div>

  <div class="col-balance">
    <div class="balance-label">Current Balance</div>
    <div class="balance-number" id="balanceNum">—</div>
    <div class="balance-unit">Stars ⭐</div>
    <div class="bricks" id="brickDisplay"></div>
    <div class="next-label">Next reward</div>
    <div class="next-reward" id="nextReward">—</div>
    <div class="next-gap" id="nextGap"></div>
  </div>

  <div class="col-earn">
    <div class="section-title">Ways to earn ⭐</div>
    <div id="behaviourList"><div class="loading">Loading...</div></div>
    <div class="section-title" style="margin-top:10px;">Louis can claim</div>
    <div id="selfList"><div class="loading">Loading...</div></div>
  </div>

  <div class="col-rewards">
    <div class="section-title">Rewards 🎁</div>
    <div id="rewardList"><div class="loading">Loading...</div></div>
  </div>
</div>

<script src="/config.js"></script>
<script>
const USE_SUPABASE = typeof SUPABASE_URL !== 'undefined' && SUPABASE_URL !== 'YOUR_SUPABASE_URL';

let balance = 0, behaviours = [], rewards = [];

async function sbFetch(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function loadAll() {
  const [stateRows, bRows, rRows] = await Promise.all([
    sbFetch('louis_state?select=balance&limit=1'),
    sbFetch('louis_behaviours?select=*&order=created_at.asc'),
    sbFetch('louis_rewards?select=*&order=cost.asc')
  ]);
  balance = stateRows?.[0]?.balance ?? 0;
  behaviours = bRows || [];
  rewards = rRows || [];
}

function render() {
  document.getElementById('balanceNum').textContent = balance;

  // bricks
  const bEl = document.getElementById('brickDisplay');
  const slots = 20; bEl.innerHTML = '';
  for (let i = 0; i < slots; i++) {
    const d = document.createElement('div');
    d.className = 'brick' + (i < balance ? '' : ' empty');
    bEl.appendChild(d);
  }

  // next reward
  const next = rewards.find(r => r.cost > balance);
  if (next) {
    document.getElementById('nextReward').textContent = next.emoji + ' ' + next.name;
    document.getElementById('nextGap').textContent = (next.cost - balance) + ' more ⭐ to go!';
  } else if (rewards.length) {
    document.getElementById('nextReward').textContent = '🏆 You can claim anything!';
    document.getElementById('nextGap').textContent = '';
  }

  // behaviours
  const parentB = behaviours.filter(b => b.type === 'parent').slice(0, 5);
  const selfB   = behaviours.filter(b => b.type === 'self').slice(0, 4);

  document.getElementById('behaviourList').innerHTML = parentB.map(b => `
    <div class="behaviour">
      <div class="b-emoji">${b.emoji}</div>
      <div class="b-text">${b.description}</div>
      <div class="b-worth">${b.worth} ⭐</div>
    </div>`).join('') || '<div class="loading">None yet</div>';

  document.getElementById('selfList').innerHTML = selfB.map(b => `
    <div class="behaviour">
      <div class="b-emoji">${b.emoji}</div>
      <div class="b-text">${b.description}</div>
      <div class="b-worth">${b.worth} ⭐</div>
    </div>`).join('') || '<div class="loading">None yet</div>';

  // rewards
  document.getElementById('rewardList').innerHTML = rewards.slice(0, 6).map(r => {
    const pct = Math.min(100, Math.round((balance / r.cost) * 100));
    const ready = balance >= r.cost;
    const icon = r.image_url
      ? `<img src="${r.image_url}" class="r-img" onerror="this.style.display='none'"/>`
      : `<span class="r-emoji">${r.emoji}</span>`;
    return `<div class="reward">
      <div class="reward-top">
        ${icon}
        <div class="r-name">${r.name}</div>
        <div class="r-cost">${r.cost}⭐</div>
      </div>
      ${ready
        ? `<div class="r-ready">✓ Ready to claim!</div>`
        : `<div class="r-bar-bg"><div class="r-bar-fill" style="width:${pct}%"></div></div>
           <div class="r-pct">${pct}%</div>`
      }
    </div>`;
  }).join('') || '<div class="loading">None yet</div>';

  document.getElementById('headerTime').textContent = 'Last updated: ' +
    new Date().toLocaleString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}

async function init() {
  if (USE_SUPABASE) {
    try { await loadAll(); } catch(e) { console.error('TRMNL load failed:', e); }
  }
  render();
}

init();
</script>
</body>
</html>
