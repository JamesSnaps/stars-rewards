server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Using it with variable upstreams (below) makes
    # nginx resolve backends lazily at request time, so the web app still boots
    # even if an upstream (e.g. the optional trmnl service) is down.
    resolver 127.0.0.11 valid=10s;

    # PostgREST — Supabase exposed its API at /rest/v1/, so we keep the same
    # path. The rewrite strips the /rest/v1/ prefix before proxying.
    location /rest/v1/ {
        set $pgrst http://stars-api:3000;
        rewrite ^/rest/v1/(.*)$ /$1 break;
        proxy_pass $pgrst;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # TRMNL e-ink JSON endpoint (replaces the Vercel /api/trmnl function)
    location /api/trmnl {
        set $trmnl http://stars-trmnl:3001;
        proxy_pass $trmnl/api/trmnl;
        proxy_set_header Host $host;
    }

    # Static app
    location / {
        try_files $uri $uri/ =404;
    }
}
